service_name: "<service-name>"

source_repo_root: "<path-or-repo-root>"
source_feature_folder: "Function/src/main/resources/features/ui/<feature-folder>"
source_feature_glob: "Function/src/main/resources/features/ui/<feature-folder>/**/*.feature"

source_features_root: "Function/src/main/resources/features/ui"
source_page_objects_root: "Function/src/main/java/domain/component/ui/pages"
source_step_lib_root: "Function/src/main/java/domain/component/ui/stepLib"
source_applicant_data_root: "Function/src/main/resources/test-data/applicant-data"

target_repo_root: "<path-or-repo-root>"
target_drone_file: ".drone.yml"
target_playwright_config_path: "playwright.config.ts"
target_e2e_root: "e2e-tests"

ci_variant:
  image_registry_type: "quay"
  image_push_step_name: "image_to_quay"
  deploy_to_branch_depends_on:
    - "clone_repos"
    - "image_to_quay"

branch_policy:
  default_branch: "master"
  feature_branches:
    - "feature/*"

target_local_run:
  command: "yarn start:dev"
  port: 8080

validation_policy:
  parity_coverage: "FAIL-ON-GAP"
  ci_wiring_breakage: "CRITICAL_WARNING"

auth_policy:
  github_app_only: true
  pat_forbidden: true
  required_anchors:
    - "github_app_token_step"
    - "github_app_token_secrets_ukho"
    - "github_app_token_secrets_hof"
    - "clone_repos_step"
  clone_flow_contract:
    push_pull_request:
      step_1_generate_token_anchor: "github_app_token_step"
      step_2_clone_anchor: "clone_repos_step"
    promote_prod:
      step_1_generate_token_anchor: "github_app_token_step"
      step_2_clone_anchor: "clone_repos_step"
    cron:
      step_1_generate_token_anchor: "github_app_token_step"
      step_2_clone_anchor: "clone_repos_step"

eslint_policy:
  required_ignore_entries:
    - "e2e-tests"
    - "playwright-report"
    - "bin/*"

gitignore_policy:
  required_entries:
    - ".features-gen"
    - "playwright-report"
    - "test-results"

deploy_script_policy:
  file_path: "bin/deploy.sh"
  require_branch_slug_exports: true
  branch_slug_exports:
    - "export BRANCH_SLUG_MAX_LENGTH=$(compute_branch_slug_max_length)"
    - "export DRONE_SOURCE_BRANCH=$(sanitize_branch_name \"${DRONE_SOURCE_BRANCH}\" \"${BRANCH_SLUG_MAX_LENGTH}\")"
  branch_host_pattern: "${APP_NAME}-${DRONE_SOURCE_BRANCH}.internal.${BRANCH_ENV}.homeoffice.gov.uk"
  require_branch_host_artifact: true
  branch_host_variable_name: "BRANCH_HOST"
  branch_host_artifact_path: "/root/.dockersock/branch_url.txt"

drone_volume_policy:
  required_dockersock_mount:
    volume_name: "dockersock"
    path: "/root/.dockersock"
  required_steps:
    - "deploy_to_branch"
    - "e2e_tests"

e2e_branch_url_policy:
  step_name: "e2e_tests"
  require_branch_url_precheck: true
  branch_url_precheck_command_contains: "test -s /root/.dockersock/branch_url.txt"
  require_playwright_base_url_from_artifact: true
  playwright_base_url_command_contains: "PLAYWRIGHT_BASE_URL=\"https://$(cat /root/.dockersock/branch_url.txt)\""
  forbid_inline_branch_host_construction: true

steering_context:
  canonical_blueprint_repo: "<path-or-repo-root>"
  canonical_blueprint_paths:
    - "lmr/.drone.yml"
    - "lmr/playwright.config.ts"
    - "lmr/package.json"
    - "lmr/e2e-tests/steps/lmr.step.ts"
    - "lmr/e2e-tests/fixture/fixtures.ts"
    - "lmr/bin/generate_github_app_token.sh"
    - "lmr/bin/publish_e2e_test_report.sh"
    - "lmr/bin/summarise_playwright_report.js"
  source_conventions_repo: "<path-or-repo-root>"
  source_conventions_paths:
    - "Function/src/main/resources/features/ui"
    - "Function/src/main/java/domain/component/ui/pages"
    - "Function/src/main/java/domain/component/ui/stepLib"
    - "Function/src/main/resources/test-data/applicant-data"
